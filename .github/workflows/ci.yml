name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
      - "feat/**"
      - "fix/**"
      - "test/**"
      - "chore/**"
      - "ci/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm compile

      - name: Build extension
        run: pnpm build

      - name: Lint extension
        run: pnpm lint:ext

      - name: Run integration tests
        run: pnpm test:integration

      - name: Pack extension
        run: pnpm pack:xpi