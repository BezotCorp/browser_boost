name: Main Orchestrator

on:
  push:
    branches:
      - main

concurrency:
  group: main-orchestrator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  simulate:
    runs-on: ubuntu-latest
    outputs:
      has_new_version: ${{ steps.check.outputs.has_new_version }}
      current_version: ${{ steps.check.outputs.current_version }}
      current_version_published: ${{ steps.check.outputs.current_version_published }}
    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BEZOTCORP_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.BEZOTCORP_RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Simulate semantic-release (dry-run, no commit/push)
        id: check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if gh release view "v${CURRENT_VERSION}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "current_version_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "current_version_published=false" >> "$GITHUB_OUTPUT"
          fi

          if npx semantic-release --dry-run 2>&1 | tee /tmp/dry-run.log | grep -q "next release version is"; then
            echo "has_new_version=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_version=false" >> "$GITHUB_OUTPUT"
          fi

  version:
    needs: simulate
    if: needs.simulate.outputs.has_new_version == 'true'
    uses: ./.github/workflows/worker-version.yml
    secrets: inherit

  sync-only:
    needs: [simulate, version]
    if: always() && needs.simulate.outputs.has_new_version == 'false' && needs.simulate.outputs.current_version_published == 'true'
    uses: ./.github/workflows/worker-sync.yml
    secrets: inherit

  publish-existing:
    needs: simulate
    if: needs.simulate.outputs.has_new_version == 'false' && needs.simulate.outputs.current_version_published == 'false'
    uses: ./.github/workflows/worker-publish.yml
    secrets: inherit
    with:
      version: ${{ needs.simulate.outputs.current_version }}

  publish-new:
    needs: version
    if: needs.version.outputs.has_new_version == 'true'
    uses: ./.github/workflows/worker-publish.yml
    secrets: inherit
    with:
      version: ${{ needs.version.outputs.new_version }}