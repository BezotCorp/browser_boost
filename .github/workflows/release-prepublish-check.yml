name: Release Prepublish Check

on:
  workflow_run:
    workflows: ["Release Version"]
    types:
      - completed
    branches:
      - main

jobs:
  prepublish-check:
    runs-on: ubuntu-latest
    steps:
      - name: Analyze Release Version outcome
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          REPO="${{ github.repository }}"

          if [ "$CONCLUSION" = "success" ]; then
            echo "Release Version succeeded — a real version bump happened. Publishing can proceed."
            exit 0
          fi

          JOB_ID=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" --jq '.jobs[0].id')
          CUSTOM_MESSAGE=$(gh api "repos/$REPO/check-runs/$JOB_ID/annotations" \
            --jq '[.[] | select(.message != "Process completed with exit code 1.")][0].message // "no custom message found"')

          if [[ "$CUSTOM_MESSAGE" == *"nothing to release"* ]]; then
            echo "::notice::No new version to publish (reason: $CUSTOM_MESSAGE) — this is expected, not an error."
            exit 1
          fi

          echo "::error::Release Version failed for an unexpected reason: $CUSTOM_MESSAGE — needs manual review."
          exit 1