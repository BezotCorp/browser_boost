name: Release Prepublish Check

on:
  workflow_run:
    workflows: ["Release Version"]
    types:
      - completed
    branches:
      - main

jobs:
  prepublish-check:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Check if a real version bump happened
        run: |
          BOT_AUTHOR="bezotcorp-release-bot[bot]"
          HEAD_AUTHOR=$(git log -1 --format='%an')
          HEAD_MESSAGE=$(git log -1 --format='%s')

          if [ "$HEAD_AUTHOR" != "$BOT_AUTHOR" ] || [[ "$HEAD_MESSAGE" != chore:\ * ]]; then
            echo "::error::No real version bump on HEAD of main (author: $HEAD_AUTHOR, message: $HEAD_MESSAGE) — nothing to publish."
            exit 1
          fi

          echo "Version bump confirmed — publish can proceed."